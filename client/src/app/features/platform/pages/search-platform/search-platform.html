<section class="containerSearch">
  <div class="containerInput">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="m21 21-4.34-4.34" />
      <circle cx="11" cy="11" r="8" />
    </svg>
    <input type="text" placeholder="Ingrese el nombre del usuario" (input)="onSearchUser($event)" />
  </div>

  @if (mostrar()) {
    @if (searchUserData() && searchUserData()!.Data.length > 0) {
      <app-list-card [listInfoCard]="searchUserData()!.Data"></app-list-card>
    } @else {
      <p>No hay usuarios</p>
    }
  } @else {
     @if (searchApi.getAllUser.hasValue()) {
       <app-list-card [listInfoCard]="searchApi.getAllUser.value().Data"></app-list-card>
     }
  }
</section>
