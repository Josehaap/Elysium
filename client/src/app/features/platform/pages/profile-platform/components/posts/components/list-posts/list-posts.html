<section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 ">
    @for (post of listPost(); track $index) {
        <app-card-post [infoPost]="post" (onOpenShare)="handleOpenShare($event)"></app-card-post>
    }
</section>

@if (sharingPostId()) {
  <app-share-post-modal
    [postId]="sharingPostId()!"
    (close)="sharingPostId.set(null)"
    (shared)="sharingPostId.set(null)"
  >
  </app-share-post-modal>
}
