<form  autocomplete="off" [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="grid grid-cols-2 p-8 gap-x-8 gap-y-6 text-sm text-primary-light ">
    
    <div class="flex flex-col gap-1">
      <label for="userIdentification" class="font-medium">Username</label>
      <input type="text" formControlName="userIdentification" id="userIdentification" autocomplete="username" placeholder="Nombre de usuario" />
    </div>


    <div class="flex flex-col gap-1">
      <label for="password" class="font-medium">Contraseña</label>
      <input type="password" formControlName="password" id="password" autocomplete="current-password" placeholder="Ingrese su contraseña" />
    </div>

   

    <div class="col-span-2 flex justify-center mt-4">
      <button type="submit" [disabled]="!profileForm.valid"
        class="bg-orange-400 hover:bg-orange-500 text-white font-bold py-2 px-6 rounded-full transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        Inicar Sesión
      </button>
    </div>
  </form>
