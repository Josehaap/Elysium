<section class="carrucel-container">
  <div class="carrucel-track">
    <!-- First set of images -->
    @for (url of urlImg(); track $index) {
      <div class="carrucel-slide">
        <img [src]="url" alt="Carousel image" />
      </div>
    }
    <!-- Duplicate set for seamless transition -->
    @for (url of urlImg(); track $index + '_duplicate') {
      <div class="carrucel-slide">
        <img [src]="url" alt="Carousel image duplicate" />
      </div>
    }
    <!-- Triple set if needed for very wide screens -->
    @for (url of urlImg(); track $index + '_triple') {
      <div class="carrucel-slide">
        <img [src]="url" alt="Carousel image triple" />
      </div>
    }
  </div>
</section>
