<section class="">
  @for (post of listPost(); track post.post_id) {
   <app-post-card [dataPost]="post" (onOpenShare)="handleOpenShare($event)"></app-post-card>
  }
</section>

@if (sharingPostId()) {
  <app-share-post-modal
    [postId]="sharingPostId()!"
    (close)="sharingPostId.set(null)"
    (shared)="sharingPostId.set(null)"
  >
  </app-share-post-modal>
}
