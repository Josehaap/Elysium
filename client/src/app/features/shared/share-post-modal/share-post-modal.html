<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Compartir publicación</h3>
      <button class="close-btn" (click)="close.emit()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    
    <div class="modal-body">
      @if (chatList().length === 0) {
        <p class="empty-msg">No tienes chats activos para compartir.</p>
      } @else {
        <div class="chat-list">
          @for (chat of chatList(); track chat.chat_id) {
            <div class="chat-item" (click)="shareWith(chat.chat_id)">
              <img [src]="getProfileImgUrl(chat.other_profile_img)" alt="Profile" class="avatar">
              <span class="username">{{ chat.other_username }}</span>
              <button class="send-btn">Enviar</button>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
